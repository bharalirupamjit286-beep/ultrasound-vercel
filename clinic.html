<!doctype html>
<html>
<head><title>Clinic</title></head>
<body>
<h2>Clinic Dashboard</h2>
<button id="logout">Logout</button>

<form id="form">
<input id="name" placeholder="Patient Name" required />
<button>Add</button>
</form>

<div id="list"></div>

<script type="module">
import { supabase } from './js/supabase.js';
import { requireRole, signOutUser } from './js/auth.js';

let sessionData;

document.getElementById('logout').onclick = async ()=> {
  await signOutUser();
  location.href = './login.html';
};

document.getElementById('form').onsubmit = async (e)=> {
  e.preventDefault();
  await supabase.from('patients').insert([{
    center_id: sessionData.profile.center_id,
    patient_name: document.getElementById('name').value
  }]);
  load();
};

async function load() {
  sessionData = await requireRole(['center_admin','staff','doctor']);
  if (!sessionData) return;

  const { data } = await supabase.from('patients').select('*');
  document.getElementById('list').innerHTML = JSON.stringify(data, null, 2);
}

load();
</script>
</body>
</html>
