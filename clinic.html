<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Clinic Workspace</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>

<body>
  <div class="page-shell">

    <header class="topbar">
      <div>
        <h1 id="clinicTitle">Clinic Workspace</h1>
        <p id="clinicWelcome">Loading...</p>
      </div>
      <button id="logoutBtn">Logout</button>
    </header>

    <div class="workspace-grid">

      <!-- LEFT PANEL -->
      <section class="card sidebar-card">
        <h2>Patient Registry</h2>

        <form id="patientForm" class="form-grid compact-grid">
          <input id="patientUid" placeholder="Patient ID" />
          <input id="patientName" placeholder="Patient name" required />
          <input id="patientAge" placeholder="Age" />
          <input id="patientSex" placeholder="Sex" />
          <input id="patientPhone" placeholder="Phone" />
          <input id="referredBy" placeholder="Referred by" />
          <button type="submit">Add Patient</button>
        </form>

        <p id="patientMsg"></p>

        <div class="toolbar-row">
          <input id="patientSearch" placeholder="Search patient" />
          <button id="refreshPatientsBtn" type="button">Refresh</button>
        </div>

        <div id="patientList" class="scroll-panel">Loading...</div>
      </section>

      <!-- RIGHT PANEL -->
      <section class="card main-card">

        <h2>Selected Patient</h2>
        <div id="selectedPatientSummary" class="muted-box">
          Select a patient from the registry.
        </div>

        <hr />

        <h2>Create Examination</h2>

        <form id="examForm" class="form-grid">

          <select id="examType" required>
            <option value="">Select exam type</option>
            <option value="NT Scan">NT Scan</option>
            <option value="Level II Scan">Level II Scan</option>
            <option value="Routine Biometry">Routine Biometry</option>
            <option value="Obstetric + Doppler">Obstetric + Doppler</option>
          </select>

          <input id="examDate" type="date" />
          <input id="gaText" placeholder="GA e.g. 12w 4d" />
          <input id="fhr" placeholder="FHR" />

          <!-- FIXED JSON FIELD -->
          <textarea id="findingsJson" class="full-span"
            placeholder='Findings JSON, e.g. {"nt":"1.8 mm","nasal_bone":"present"}'>
          </textarea>

          <textarea id="impression" class="full-span" placeholder="Impression"></textarea>
          <textarea id="reportHtml" class="full-span" placeholder="Optional report HTML"></textarea>

          <button type="submit">Save Examination</button>
        </form>

        <p id="examMsg"></p>

        <hr />

        <h2>Report Preview</h2>
        <div id="reportPreview" class="report-preview-card">
          No preview yet.
        </div>

        <hr />

        <h2>Recent Examinations</h2>
        <div id="examList" class="scroll-panel">
          No examinations loaded.
        </div>

      </section>

    </div>
  </div>

  <!-- SCRIPT -->
  <script type="module" src="./js/clinic.js"></script>

</body>
</html>
