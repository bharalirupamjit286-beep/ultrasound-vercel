<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Clinic Dashboard</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <div>
        <h1 id="clinicTitle">Clinic Dashboard</h1>
        <p id="clinicWelcome">Loading...</p>
      </div>
      <button id="logoutBtn">Logout</button>
    </header>

    <main class="dashboard-grid">
      <section class="card">
        <h2>Patient Registry</h2>
        <form id="patientForm" class="form-grid">
          <input id="patientUid" placeholder="Patient ID" />
          <input id="patientName" placeholder="Patient name" required />
          <input id="patientAge" placeholder="Age" />
          <input id="patientSex" placeholder="Sex" />
          <input id="patientPhone" placeholder="Phone" />
          <input id="referredBy" placeholder="Referred by" />
          <button type="submit">Add Patient</button>
        </form>
        <p id="patientMsg"></p>
      </section>

      <section class="card">
        <h2>Recent Patients</h2>
        <div id="patientList">Loading...</div>
      </section>
    </main>
  </div>

  <script type="module" src="./js/clinic.js"></script>
</body>
</html>
